<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
        <stop offset="0%" stop-color="#1e1b4b" />
        <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(168, 85, 247, 0.4)" />
        <stop offset="100%" stop-color="rgba(168, 85, 247, 0)" />
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.15)" />
        <stop offset="100%" stop-color="rgba(255,255,255,0.03)" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
        <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="450" fill="url(#bgGrad)" />
  
  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
     <path d="M 0 100 L 800 100 M 0 200 L 800 200 M 0 300 L 800 300 M 0 400 L 800 400" />
     <path d="M 100 0 L 100 450 M 200 0 L 200 450 M 300 0 L 300 450 M 400 0 L 400 450 M 500 0 L 500 450 M 600 0 L 600 450 M 700 0 L 700 450" />
  </g>
  
  <!-- Central Aura & Rings -->
  <circle cx="400" cy="180" r="180" fill="url(#aura)" />
  <ellipse cx="400" cy="180" rx="160" ry="45" fill="none" stroke="rgba(167, 139, 250, 0.2)" stroke-width="1.5" transform="rotate(-5 400 180)"/>
  <ellipse cx="400" cy="180" rx="160" ry="45" fill="none" stroke="rgba(96, 165, 250, 0.2)" stroke-width="1.5" transform="rotate(15 400 180)"/>
  <ellipse cx="400" cy="180" rx="140" ry="35" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-dasharray="4 8" stroke-width="2" transform="rotate(35 400 180)"/>
  
  <!-- Connection Paths -->
  <g stroke="#818cf8" stroke-width="2" fill="none" stroke-dasharray="4 4" opacity="0.8">
    <path d="M 400 180 Q 330 140 265 140" />
    <path d="M 400 180 Q 470 140 535 140" />
    <path d="M 400 180 Q 330 250 265 290" />
    <path d="M 400 180 Q 470 250 535 290" />
  </g>

  <!-- 3D CUBES (4 SYSTEMS) -->
  <!-- Cube 1: Data Middle Platform -->
  <g filter="url(#shadow)">
    <polygon points="220,100 265,120 220,140 175,120" fill="#60a5fa" />
    <polygon points="175,120 220,140 220,180 175,160" fill="#1e3a8a" />
    <polygon points="220,140 265,120 265,160 220,180" fill="#2563eb" />
    <path d="M220,100 L265,120 L220,140 L175,120 Z" stroke="#bfdbfe" fill="none" stroke-width="1" stroke-linejoin="round"/>
    <path d="M175,120 L175,160 M265,120 L265,160 M220,140 L220,180" stroke="#93c5fd" fill="none" stroke-width="1"/>
    <circle cx="220" cy="100" r="3" fill="#fff" filter="url(#glow)"/>
  </g>
  <rect x="150" y="195" width="140" height="30" rx="6" fill="url(#glass)" stroke="rgba(255,255,255,0.2)" filter="url(#shadow)"/>
  <text x="220" y="215" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle">数据中台</text>

  <!-- Cube 2: Audit Knowledge Base -->
  <g filter="url(#shadow)">
    <polygon points="580,100 625,120 580,140 535,120" fill="#34d399" />
    <polygon points="535,120 580,140 580,180 535,160" fill="#064e3b" />
    <polygon points="580,140 625,120 625,160 580,180" fill="#059669" />
    <path d="M580,100 L625,120 L580,140 L535,120 Z" stroke="#a7f3d0" fill="none" stroke-width="1" stroke-linejoin="round"/>
    <path d="M535,120 L535,160 M625,120 L625,160 M580,140 L580,180" stroke="#6ee7b7" fill="none" stroke-width="1"/>
    <circle cx="580" cy="100" r="3" fill="#fff" filter="url(#glow)"/>
  </g>
  <rect x="510" y="195" width="140" height="30" rx="6" fill="url(#glass)" stroke="rgba(255,255,255,0.2)" filter="url(#shadow)"/>
  <text x="580" y="215" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle">审计知识库</text>

  <!-- Cube 3: Textbook Selection -->
  <g filter="url(#shadow)">
    <polygon points="220,270 265,290 220,310 175,290" fill="#fbbf24" />
    <polygon points="175,290 220,310 220,350 175,330" fill="#78350f" />
    <polygon points="220,310 265,290 265,330 220,350" fill="#d97706" />
    <path d="M220,270 L265,290 L220,310 L175,290 Z" stroke="#fde68a" fill="none" stroke-width="1" stroke-linejoin="round"/>
    <path d="M175,290 L175,330 M265,290 L265,330 M220,310 L220,350" stroke="#fcd34d" fill="none" stroke-width="1"/>
    <circle cx="220" cy="270" r="3" fill="#fff" filter="url(#glow)"/>
  </g>
  <rect x="150" y="365" width="140" height="30" rx="6" fill="url(#glass)" stroke="rgba(255,255,255,0.2)" filter="url(#shadow)"/>
  <text x="220" y="385" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle">教材选用系统</text>

  <!-- Cube 4: Intelligent Monitor -->
  <g filter="url(#shadow)">
    <polygon points="580,270 625,290 580,310 535,290" fill="#fb7185" />
    <polygon points="535,290 580,310 580,350 535,330" fill="#881337" />
    <polygon points="580,310 625,290 625,330 580,350" fill="#e11d48" />
    <path d="M580,270 L625,290 L580,310 L535,290 Z" stroke="#fecdd3" fill="none" stroke-width="1" stroke-linejoin="round"/>
    <path d="M535,290 L535,330 M625,290 L625,330 M580,310 L580,350" stroke="#fda4af" fill="none" stroke-width="1"/>
    <circle cx="580" cy="270" r="3" fill="#fff" filter="url(#glow)"/>
  </g>
  <rect x="510" y="365" width="140" height="30" rx="6" fill="url(#glass)" stroke="rgba(255,255,255,0.2)" filter="url(#shadow)"/>
  <text x="580" y="385" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif" text-anchor="middle">智能监控平台</text>

  <!-- CENTRAL DIAMOND CORE -->
  <g filter="url(#shadow)">
    <polygon points="400,100 330,150 400,180" fill="#8b5cf6" />
    <polygon points="400,100 470,150 400,180" fill="#a855f7" />
    <polygon points="330,150 400,180 400,250" fill="#4c1d95" />
    <polygon points="470,150 400,180 400,250" fill="#6d28d9" />
    <path d="M400,100 L330,150 L400,250 L470,150 Z" stroke="#ddd6fe" fill="none" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M330,150 L400,180 L470,150 M400,100 L400,180 M400,180 L400,250" stroke="#ddd6fe" fill="none" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="400" cy="100" r="5" fill="#fff" filter="url(#glow)"/>
  </g>
  
  <!-- Central Text -->
  <text x="400" y="295" fill="#fff" font-size="26" font-weight="bold" font-family="sans-serif" text-anchor="middle" filter="url(#shadow)">鲸码互联网科技</text>
  <text x="400" y="325" fill="#94a3b8" font-size="14" font-family="sans-serif" letter-spacing="3" text-anchor="middle">AI赋能企业创新与数字化转型</text>

  <!-- 6 SERVICE PILLS -->
  <g transform="translate(0, 406)">
    <!-- Pill 1 -->
    <rect x="50" y="0" width="105" height="28" rx="14" fill="rgba(30,41,59,0.8)" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="102" y="19" fill="#cbd5e1" font-size="12" font-family="sans-serif" text-anchor="middle"> AI+编程</text>
    
    <!-- Pill 2 -->
    <rect x="170" y="0" width="105" height="28" rx="14" fill="rgba(30,41,59,0.8)" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="222" y="19" fill="#cbd5e1" font-size="12" font-family="sans-serif" text-anchor="middle"> 极致性价比</text>
    
    <!-- Pill 3 -->
    <rect x="290" y="0" width="105" height="28" rx="14" fill="rgba(30,41,59,0.8)" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="342" y="19" fill="#cbd5e1" font-size="12" font-family="sans-serif" text-anchor="middle"> 实时响应</text>
    
    <!-- Pill 4 -->
    <rect x="410" y="0" width="105" height="28" rx="14" fill="rgba(30,41,59,0.8)" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="462" y="19" fill="#cbd5e1" font-size="12" font-family="sans-serif" text-anchor="middle"> 需求参与</text>
    
    <!-- Pill 5 -->
    <rect x="530" y="0" width="105" height="28" rx="14" fill="rgba(30,41,59,0.8)" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="582" y="19" fill="#cbd5e1" font-size="12" font-family="sans-serif" text-anchor="middle"> 原型设计</text>
    
    <!-- Pill 6 -->
    <rect x="650" y="0" width="105" height="28" rx="14" fill="rgba(30,41,59,0.8)" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="702" y="19" fill="#cbd5e1" font-size="12" font-family="sans-serif" text-anchor="middle"> 优质售后</text>
  </g>
</svg>
